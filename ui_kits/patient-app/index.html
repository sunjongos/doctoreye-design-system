<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Doctor Eye · Patient App</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; height: 100%; background: #EEF2F1; }
  .stage { min-height: 100vh; display: grid; place-items: center; padding: 40px 20px; }
  .phone {
    width: 390px; height: 760px; background: #F4F7F6;
    border-radius: 40px; border: 8px solid #1A2B3C;
    box-shadow: 0 40px 80px rgb(26 43 60 / 0.25);
    position: relative; overflow: hidden;
  }
  .notch {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 28px; background: #1A2B3C; border-radius: 999px; z-index: 10;
  }
  .status {
    position: absolute; top: 14px; left: 0; right: 0; padding: 0 28px;
    display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; color: #1A2B3C; z-index: 11;
  }
  .scroll { position: absolute; top: 44px; left: 0; right: 0; bottom: 72px; overflow: auto; }
  .scroll::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root" class="stage"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>
<script type="text/babel" data-presets="react">
  function App() {
    const [tab, setTab] = React.useState(() => localStorage.getItem('doctoreye.tab') || 'home');
    React.useEffect(() => localStorage.setItem('doctoreye.tab', tab), [tab]);

    const Screen = { home: HomeScreen, results: ResultsScreen, book: BookScreen, profile: ProfileScreen }[tab];

    return (
      <div className="phone" data-screen-label={`01 Patient App · ${tab}`}>
        <div className="notch" />
        <div className="status">
          <span>9:41</span>
          <span style={{ display: 'inline-flex', gap: 6, alignItems: 'center' }}>
            <span>●●●●</span>
            <span style={{ fontSize: 11 }}>100%</span>
          </span>
        </div>
        <TopBar />
        <div className="scroll" style={{ top: 98 }}>
          <Screen onGoResults={() => setTab('results')} />
        </div>
        <TabBar current={tab} onChange={setTab} />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<div className="stage"><App /></div>);
</script>
</body>
</html>
