<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.btn{font-family:inherit;font-weight:500;font-size:15px;border:0;padding:12px 22px;border-radius:8px;cursor:pointer;transition:all 150ms cubic-bezier(.22,1,.36,1)}
.p{background:#17B798;color:#fff;box-shadow:0 1px 2px rgb(0 0 0 / 0.05)}
.p:hover{background:#13a187}
.s{background:#F4F7F6;color:#1A2B3C}
.s:hover{background:#E5E7EB}
.n{background:#1A2B3C;color:#fff}
.g{background:transparent;color:#1A2B3C;border:1px solid #E5E7EB}
.g:hover{background:#F4F7F6}
.sm{padding:8px 14px;font-size:13px}
.lg{padding:14px 28px;font-size:16px}
.ic{display:inline-flex;align-items:center;gap:8px}
</style></head><body>
<button class="btn p">Book Exam</button>
<button class="btn s">Secondary</button>
<button class="btn n">Navy action</button>
<button class="btn g">Ghost</button>
<button class="btn p ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>Run Vision Check</button>
<button class="btn p sm">Small</button>
</body></html>
