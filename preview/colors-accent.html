<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;display:flex;gap:12px;align-items:center;}
.sw{flex:1;border-radius:12px;padding:14px;color:#fff;display:flex;flex-direction:column;justify-content:space-between;min-height:104px;box-shadow:var(--shadow-card);}
.sw .big{font-size:22px;font-weight:700;letter-spacing:-0.01em}
.sw .name{font-size:13px;font-weight:500;opacity:.95}
.sw .hex{font-family:var(--font-mono);font-size:12px;opacity:.85}
</style></head><body>
<div class="sw" style="background:#92C118"><div><div class="big">Health</div><div class="name">Vitality · Success</div></div><div class="hex">#92C118</div></div>
<div class="sw" style="background:#0087B6"><div><div class="big">Doctor Blue</div><div class="name">Info · Diagnostic</div></div><div class="hex">#0087B6</div></div>
<div class="sw" style="background:#F29D00"><div><div class="big">Orange</div><div class="name">Warning</div></div><div class="hex">#F29D00</div></div>
<div class="sw" style="background:#E5484D"><div><div class="big">Red</div><div class="name">Danger</div></div><div class="hex">#E5484D</div></div>
</body></html>
