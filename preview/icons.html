<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<style>body{margin:0;padding:22px;background:#fff;display:grid;grid-template-columns:repeat(8,1fr);gap:18px;align-items:center;justify-items:center;color:#1A2B3C}
.stack{display:flex;flex-direction:column;align-items:center;gap:6px}
.lbl{font-size:10px;color:#6B7280;font-family:var(--font-mono)}
</style></head><body>
<div class="stack"><i data-lucide="eye" style="width:24px;height:24px"></i><span class="lbl">eye</span></div>
<div class="stack"><i data-lucide="eye-off" style="width:24px;height:24px"></i><span class="lbl">eye-off</span></div>

<div class="stack"><i data-lucide="activity" style="width:24px;height:24px"></i><span class="lbl">activity</span></div>

<div class="stack"><i data-lucide="stethoscope" style="width:24px;height:24px"></i><span class="lbl">stethoscope</span></div>
<div class="stack"><i data-lucide="calendar" style="width:24px;height:24px"></i><span class="lbl">calendar</span></div>
<div class="stack"><i data-lucide="user-round" style="width:24px;height:24px"></i><span class="lbl">user</span></div>

<div class="stack"><i data-lucide="file-text" style="width:24px;height:24px"></i><span class="lbl">file</span></div>
<div class="stack"><i data-lucide="chart-line" style="width:24px;height:24px"></i><span class="lbl">chart</span></div>
<div class="stack"><i data-lucide="search" style="width:24px;height:24px"></i><span class="lbl">search</span></div>
<div class="stack"><i data-lucide="settings" style="width:24px;height:24px"></i><span class="lbl">settings</span></div>
<div class="stack"><i data-lucide="chevron-right" style="width:24px;height:24px"></i><span class="lbl">chevron</span></div>
