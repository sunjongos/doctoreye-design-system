<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;display:flex;gap:18px;align-items:flex-end}
.box{background:#E6F7F3;border:1px dashed #17B798;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#0F8570;font-family:var(--font-mono);font-size:11px}
.lbl{font-size:11px;color:#6B7280;font-family:var(--font-mono);margin-top:6px;text-align:center}
.stack{display:flex;flex-direction:column;align-items:center}
</style></head><body>
<div class="stack"><div class="box" style="width:4px;height:4px"></div><div class="lbl">4</div></div>
<div class="stack"><div class="box" style="width:8px;height:8px"></div><div class="lbl">8</div></div>
<div class="stack"><div class="box" style="width:12px;height:12px"></div><div class="lbl">12</div></div>
<div class="stack"><div class="box" style="width:16px;height:16px"></div><div class="lbl">16</div></div>
<div class="stack"><div class="box" style="width:24px;height:24px"></div><div class="lbl">24</div></div>
<div class="stack"><div class="box" style="width:32px;height:32px"></div><div class="lbl">32</div></div>
<div class="stack"><div class="box" style="width:48px;height:48px"></div><div class="lbl">48</div></div>
<div class="stack"><div class="box" style="width:64px;height:64px"></div><div class="lbl">64</div></div>
</body></html>
