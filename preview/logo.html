<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px;background:#fff;display:flex;gap:24px;align-items:center;justify-content:center}
.logo img{display:block}
.cap{font-size:11px;color:#6B7280;font-family:var(--font-mono);margin-top:8px;text-align:center}

<div class="stack"><img src="../assets/logo-mark.svg" width="80" height="80"><div class="cap">logo-mark</div></div>
<div class="stack"><img src="../assets/wordmark.svg" height="64"><div class="cap">wordmark</div></div>
<div class="stack"><div class="swatch" style="background:#17B798"><img src="../assets/favicon.svg" width="40" height="40" style="filter:brightness(0) invert(1)"></div><div class="cap">favicon · 64px</div></div>
