<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:28px;background:#F4F7F6;display:flex;gap:20px;align-items:center;justify-content:space-around}
.el{background:#fff;width:130px;height:86px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#1A2B3C;font-weight:600;font-size:13px;border:1px solid #F3F4F6}
.s{font-size:11px;font-family:var(--font-mono);color:#6B7280;text-align:center;margin-top:8px}
.stack{display:flex;flex-direction:column;align-items:center}
</style></head><body>
<div class="stack"><div class="el" style="box-shadow:0 1px 2px rgb(0 0 0 / 0.05)">shadow-sm</div><div class="s">buttons</div></div>
<div class="stack"><div class="el" style="box-shadow:0 4px 20px rgb(0 0 0 / 0.04)">shadow-card</div><div class="s">cards · default</div></div>
<div class="stack"><div class="el" style="box-shadow:0 10px 30px rgb(23 183 152 / 0.15)">shadow-pop</div><div class="s">hover · toast</div></div>
</body></html>
