<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.row{display:flex;align-items:center;gap:10px}
.chip{width:36px;height:36px;border-radius:8px;flex-shrink:0;border:1px solid rgba(0,0,0,.05)}
.n{font-size:12px;font-weight:500;color:#1A2B3C}
.h{font-family:var(--font-mono);font-size:11px;color:#6B7280}
.section{grid-column:span 4;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#6B7280;margin-top:6px}
</style></head><body>
<div class="section">Mint scale</div>
<div class="row"><div class="chip" style="background:#E6F7F3"></div><div><div class="n">Mint 50</div><div class="h">#E6F7F3</div></div></div>
<div class="row"><div class="chip" style="background:#CDEFE7"></div><div><div class="n">Mint 100</div><div class="h">#CDEFE7</div></div></div>
<div class="row"><div class="chip" style="background:#17B798"></div><div><div class="n">Mint 500</div><div class="h">#17B798</div></div></div>
<div class="row"><div class="chip" style="background:#0F8570"></div><div><div class="n">Mint 700</div><div class="h">#0F8570</div></div></div>
<div class="section">Navy scale</div>
<div class="row"><div class="chip" style="background:#6B7A8C"></div><div><div class="n">Navy 400</div><div class="h">#6B7A8C</div></div></div>
<div class="row"><div class="chip" style="background:#3B4F65"></div><div><div class="n">Navy 600</div><div class="h">#3B4F65</div></div></div>
<div class="row"><div class="chip" style="background:#223347"></div><div><div class="n">Navy 800</div><div class="h">#223347</div></div></div>
<div class="row"><div class="chip" style="background:#1A2B3C"></div><div><div class="n">Navy 900</div><div class="h">#1A2B3C</div></div></div>
</body></html>
