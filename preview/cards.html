<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#F4F7F6;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{background:#fff;border:1px solid #F3F4F6;border-radius:12px;box-shadow:0 4px 20px rgb(0 0 0 / 0.04);padding:20px}
.head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.pill{width:4px;height:22px;border-radius:999px;background:#17B798}
.pill.n{background:#1A2B3C}
.title{font-size:15px;font-weight:700;color:#1A2B3C}
.k{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:#6B7A8C;margin-bottom:4px}
.v{font-size:30px;font-weight:700;color:#1A2B3C;letter-spacing:-0.02em;font-variant-numeric:tabular-nums}
.u{font-size:14px;color:#6B7A8C;font-weight:500;margin-left:4px}
.tag{display:inline-block;font-size:11px;font-weight:500;padding:3px 8px;border-radius:999px;background:#E6F7F3;color:#0F8570;margin-top:6px}
</style></head><body>
<div class="card">
  <div class="head"><span class="pill"></span><span class="title">Intraocular Pressure</span></div>
  <div class="k">Left · Right</div>
  <div class="v">14<span class="u">mmHg</span> · 15<span class="u">mmHg</span></div>
  <span class="tag">Normal range</span>
</div>
<div class="card">
  <div class="head"><span class="pill n"></span><span class="title">Visual Acuity</span></div>
  <div class="k">Binocular</div>
  <div class="v">20/20</div>
  <span class="tag" style="background:#F4F9E6;color:#5a7a0f">+0.1 vs last visit</span>
</div>
</body></html>
