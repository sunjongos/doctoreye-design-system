<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pill{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;border:1px solid}
.dot{width:10px;height:10px;border-radius:999px;flex-shrink:0}
.lbl{font-size:13px;font-weight:600;color:#1A2B3C}
.ex{font-size:12px;color:#6B7280;margin-left:auto}
</style></head><body>
<div class="pill" style="background:#E6F7F3;border-color:#CDEFE7"><span class="dot" style="background:#17B798"></span><span class="lbl">Success</span><span class="ex">Normal range</span></div>
<div class="pill" style="background:#F4F9E6;border-color:#E2EFB8"><span class="dot" style="background:#92C118"></span><span class="lbl">Positive</span><span class="ex">+12% vitality</span></div>
<div class="pill" style="background:#E0F3FA;border-color:#B8DDED"><span class="dot" style="background:#0087B6"></span><span class="lbl">Info</span><span class="ex">AI diagnostic</span></div>
<div class="pill" style="background:#FEF3DC;border-color:#FADFA2"><span class="dot" style="background:#F29D00"></span><span class="lbl">Warning</span><span class="ex">Slightly elevated</span></div>
<div class="pill" style="background:#FCEAEA;border-color:#F5C3C4"><span class="dot" style="background:#E5484D"></span><span class="lbl">Danger</span><span class="ex">Requires follow-up</span></div>
<div class="pill" style="background:#F3F4F6;border-color:#E5E7EB"><span class="dot" style="background:#6B7280"></span><span class="lbl">Neutral</span><span class="ex">Pending</span></div>
</body></html>
