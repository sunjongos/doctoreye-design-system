<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;display:flex;gap:12px;align-items:center;}
.sw{flex:1;border-radius:12px;padding:14px;color:#fff;display:flex;flex-direction:column;justify-content:space-between;min-height:104px;box-shadow:var(--shadow-card);}
.sw .name{font-size:13px;font-weight:500;opacity:.95}
.sw .hex{font-family:var(--font-mono);font-size:12px;opacity:.85}
.sw .big{font-size:22px;font-weight:700;letter-spacing:-0.01em}
</style></head><body>
<div class="sw" style="background:#17B798"><div><div class="big">Mint</div><div class="name">Primary · CTA</div></div><div class="hex">#17B798</div></div>
<div class="sw" style="background:#1A2B3C"><div><div class="big">Navy</div><div class="name">Text · Nav</div></div><div class="hex">#1A2B3C</div></div>
<div class="sw" style="background:#F4F7F6;color:#1A2B3C;border:1px solid #E5E7EB"><div><div class="big">Surface</div><div class="name">Page bg</div></div><div class="hex">#F4F7F6</div></div>
<div class="sw" style="background:#FFFFFF;color:#1A2B3C;border:1px solid #E5E7EB"><div><div class="big">White</div><div class="name">Card</div></div><div class="hex">#FFFFFF</div></div>
</body></html>
