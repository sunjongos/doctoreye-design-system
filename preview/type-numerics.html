<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;display:flex;gap:24px;align-items:center}
.col{flex:1}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";font-weight:700;color:#1A2B3C}
.big{font-size:56px;letter-spacing:-0.02em;line-height:1}
.unit{font-size:18px;font-weight:500;color:#6B7A8C;margin-left:6px}
.cap{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:#6B7A8C;margin-bottom:10px}
.mono{font-family:var(--font-mono);font-size:14px;color:#1A2B3C;background:#F4F7F6;padding:8px 10px;border-radius:6px;display:inline-block}
</style></head><body>
<div class="col">
  <div class="cap">Tabular numerals</div>
  <div class="num big">14<span class="unit">mmHg</span></div>
  <div class="num" style="font-size:18px;color:#3B4F65;margin-top:6px">20/20 · 1.0</div>
</div>
<div class="col">
  <div class="cap">Monospace</div>
  <div class="mono">patient_id: 0238</div>
  <div class="mono" style="margin-top:8px">--doc-mint: #17B798</div>
</div>
</body></html>
