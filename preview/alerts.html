<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px;background:#F4F7F6;display:flex;flex-direction:column;gap:10px}
.a{display:flex;gap:12px;padding:14px 16px;border-radius:10px;border:1px solid;align-items:flex-start}
.t{font-size:14px;font-weight:600;margin-bottom:2px}
.m{font-size:13px;line-height:1.5}
.dot{width:8px;height:8px;border-radius:999px;margin-top:7px;flex-shrink:0}
</style></head><body>
<div class="a" style="background:#E6F7F3;border-color:#CDEFE7;color:#0F8570"><span class="dot" style="background:#17B798"></span><div><div class="t">All clear</div><div class="m">Your vision check is complete. No issues detected.</div></div></div>
<div class="a" style="background:#FEF3DC;border-color:#FADFA2;color:#8a5800"><span class="dot" style="background:#F29D00"></span><div><div class="t">Slightly elevated</div><div class="m">Intraocular pressure is above baseline. We recommend consulting your care team.</div></div></div>
<div class="a" style="background:#FCEAEA;border-color:#F5C3C4;color:#a82930"><span class="dot" style="background:#E5484D"></span><div><div class="t">Follow-up required</div><div class="m">Please book an in-person exam within 7 days.</div></div></div>
</body></html>
